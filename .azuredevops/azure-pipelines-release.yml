trigger:
  tags:
    include:
      - 'Abgabe_*'

pr: none

pool:
  vmImage: ubuntu-24.04

variables:
- group: github-secret-Public-Repository

- name: buildConfiguration
  value: Release

- name: githubRepo
  value: zbw-online/it27.sw.group05

- name: docsFolder
  value: '$(Build.SourcesDirectory)/docs'

- name: pdfOutputFolder
  value: '$(Build.ArtifactStagingDirectory)/pdf'

steps:
- checkout: self
  clean: true

- task: UseDotNet@2
  inputs:
    packageType: sdk
    version: 9.x

- script: dotnet restore
  displayName: Restore

- script: dotnet format --verify-no-changes
  displayName: Verify formatting

- script: dotnet test --configuration $(buildConfiguration) --no-restore
  displayName: Run tests

- script: |
    set -euo pipefail

    sudo apt-get update
    sudo apt-get install -y libreoffice

    mkdir -p "$(pdfOutputFolder)"

    if [ ! -d "$(docsFolder)" ]; then
      echo "ERROR: Docs folder not found: $(docsFolder)"
      exit 1
    fi

    mapfile -d '' files < <(find "$(docsFolder)" -type f -iname "*.docx" -print0)

    if [ ${#files[@]} -eq 0 ]; then
      echo "ERROR: No .docx files found in $(docsFolder)"
      exit 1
    fi

    for file in "${files[@]}"; do
      echo "Converting: $file"
      libreoffice --headless --convert-to pdf --outdir "$(pdfOutputFolder)" "$file"
    done

    echo "Generated PDFs:"
    ls -la "$(pdfOutputFolder)"
  displayName: Convert DOCX to PDF

- task: PublishPipelineArtifact@1
  displayName: Publish PDF artifact
  inputs:
    targetPath: '$(pdfOutputFolder)'
    artifact: 'PdfFiles'
    publishLocation: 'pipeline'

- script: |
    set -euo pipefail

    TAG_NAME="$(Build.SourceBranchName)"
    GH_REPO="$(githubRepo)"
    PDF_DIR="$(pdfOutputFolder)"

    echo "Repo: $GH_REPO"
    echo "Tag:  $TAG_NAME"
    echo "PDFs: $PDF_DIR"

    TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-}}"
    if [ -z "$TOKEN" ]; then
      echo "ERROR: No GitHub token injected. Check variable group linking + pipeline permissions."
      exit 1
    fi
    export GH_TOKEN="$TOKEN"
    export GITHUB_TOKEN="$TOKEN"

    gh api "repos/$GH_REPO" >/dev/null

    if ! gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
      gh release create "$TAG_NAME" \
        --repo "$GH_REPO" \
        --title "$TAG_NAME" \
        --notes "Automated PDF release created by Azure DevOps pipeline."
    fi

    shopt -s nullglob
    pdfs=("$PDF_DIR"/*.pdf)

    if [ ${#pdfs[@]} -eq 0 ]; then
      echo "ERROR: No PDF files found in $PDF_DIR"
      exit 1
    fi

    gh release upload "$TAG_NAME" "${pdfs[@]}" --repo "$GH_REPO" --clobber
  displayName: Create GitHub Release + upload PDFs
  env:
    GH_TOKEN: $(GITHUB_TOKEN)
    GITHUB_TOKEN: $(GITHUB_TOKEN)
