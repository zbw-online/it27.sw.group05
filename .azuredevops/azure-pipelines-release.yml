# Release Pipeline - GitHub Release Creation
# Triggers on: Tags matching Abgabe_Aufgabe* on main branch
# Dependencies: CI - Tests and CI - Formatting must pass

trigger: none
pr: none

# Only trigger on tags
resources:
  repositories:
  - repository: self
    type: git
    trigger:
      tags:
        include:
        - Abgabe_Aufgabe*
  
  # Depend on existing CI pipelines
  pipelines:
  - pipeline: tests
    source: 'CI - Tests'  # ⚠️ Must match exact pipeline name in Azure DevOps
    trigger: false
  
  - pipeline: formatting
    source: 'CI - Formatting'  # ⚠️ Must match exact pipeline name in Azure DevOps
    trigger: false

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'

stages:
# ============================================
# STAGE 1: Validate Release Prerequisites
# ============================================
- stage: ValidateRelease
  displayName: '🔍 Validate Release'
  condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/Abgabe_Aufgabe')
  jobs:
  - job: CheckPrerequisites
    displayName: 'Check CI Pipeline Status'
    steps:
    - checkout: self
      fetchDepth: 0
      fetchTags: true

    - script: |
        echo "================================================"
        echo "Release Validation"
        echo "================================================"
        echo "Tag: $(Build.SourceBranchName)"
        echo "Source Branch: $(Build.SourceBranch)"
        echo "Commit: $(Build.SourceVersion)"
        echo "================================================"
        
        # Verify tag is on main branch
        TAG_COMMIT=$(git rev-parse $(Build.SourceBranchName) 2>/dev/null || echo "")
        if [ -z "$TAG_COMMIT" ]; then
          echo "##vso[task.logissue type=error]Tag $(Build.SourceBranchName) not found!"
          exit 1
        fi
        
        # Check if tag points to a commit on main branch
        git branch -r --contains $TAG_COMMIT | grep -q "origin/main"
        if [ $? -ne 0 ]; then
          echo "##vso[task.logissue type=error]Tag must be on main branch!"
          echo "Current tag commit: $TAG_COMMIT"
          exit 1
        fi
        
        echo "✅ Tag is on main branch"
        echo "✅ Prerequisites validated"
      displayName: 'Verify Tag on Main Branch'
      failOnStderr: false

# ============================================
# STAGE 2: Re-run Quality Checks (Safety Net)
# ============================================
- stage: QualityGate
  displayName: '🛡️ Quality Gate'
  dependsOn: ValidateRelease
  jobs:
  - job: FormatCheck
    displayName: 'Verify Formatting'
    steps:
    - checkout: self
      clean: true

    - task: UseDotNet@2
      displayName: 'Install .NET 9 SDK'
      inputs:
        packageType: sdk
        version: 9.x

    - script: dotnet restore OrderManagement.sln
      displayName: 'Restore Packages'

    - script: dotnet format OrderManagement.sln --verify-no-changes
      displayName: 'Verify Code Formatting'

  - job: RunTests
    displayName: 'Run All Tests'
    dependsOn: FormatCheck
    steps:
    - checkout: self
      clean: true

    - task: UseDotNet@2
      displayName: 'Install .NET 9 SDK'
      inputs:
        packageType: sdk
        version: 9.x

    - script: dotnet restore OrderManagement.sln
      displayName: 'Restore Dependencies'

    - script: dotnet build OrderManagement.sln --configuration $(buildConfiguration) --no-restore
      displayName: 'Build Solution'

    # Unit Tests (Domain + SharedKernel)
    - script: |
        dotnet test tests/OrderManagement.Domain.Tests/OrderManagement.Domain.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/TestResults/Unit
      displayName: 'Run Domain Tests'

    - script: |
        dotnet test tests/SharedKernel.Tests/SharedKernel.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/TestResults/Unit
      displayName: 'Run SharedKernel Tests'

    # Integration Tests (Infrastructure with Testcontainers)
    - script: |
        dotnet test tests/OrderManagement.Infrastructure.Tests/OrderManagement.Infrastructure.Tests.csproj \
          --configuration $(buildConfiguration) \
          --no-build \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/TestResults/Integration
      displayName: 'Run Infrastructure Tests (Testcontainers)'
      env:
        DOCKER_HOST: unix:///var/run/docker.sock

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
        mergeTestResults: true
        failTaskOnFailedTests: true
        testRunTitle: 'Release Quality Gate - All Tests'

# ============================================
# STAGE 3: Create GitHub Release
# ============================================
- stage: Release
  displayName: '🚀 GitHub Release'
  dependsOn: QualityGate
  condition: succeeded()
  jobs:
  - deployment: CreateRelease
    displayName: 'Publish to GitHub'
    environment: 'Production-Release'  # Optional: Adds manual approval gate
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            fetchDepth: 0
            fetchTags: true

          # Extract assignment number from tag
          - script: |
              TAG_NAME=$(Build.SourceBranchName)
              ASSIGNMENT_NUM=$(echo $TAG_NAME | sed 's/Abgabe_Aufgabe_//' | sed 's/Abgabe_Aufgabe/1/')
              echo "Tag: $TAG_NAME"
              echo "Assignment Number: $ASSIGNMENT_NUM"
              echo "##vso[task.setvariable variable=assignmentNumber]$ASSIGNMENT_NUM"
            displayName: 'Extract Assignment Number'

          # Generate changelog
          - script: |
              # Get commit messages since last tag
              LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
              
              if [ -z "$LAST_TAG" ]; then
                echo "No previous tag found, using all commits"
                CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
              else
                echo "Generating changelog since $LAST_TAG"
                CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
              fi
              
              # Save changelog
              echo "$CHANGELOG" > $(Agent.TempDirectory)/changelog.txt
              
              # Display for logs
              echo "================================================"
              echo "Changelog:"
              echo "================================================"
              cat $(Agent.TempDirectory)/changelog.txt
              echo "================================================"
            displayName: 'Generate Changelog'

          # Create comprehensive release notes
          - script: |
              cat > $(Agent.TempDirectory)/release-notes.md << 'RELEASE_NOTES'
              # 🎓 Abgabe Aufgabe $(assignmentNumber) - MusterAG Order Management System
              
              ## 📋 Assignment Submission
              
              **Course**: Advanced Software Development  
              **Team**: Group 05  
              **Repository**: https://github.com/zbw-online/it27.sw.group05  
              **Submission Date**: $(Build.QueueTime)
              
              ---
              
              ## ✅ Quality Assurance - All Gates Passed
              
              This release has passed all quality checks:
              
              ### 🔍 Code Quality
              - ✔️ **Code Formatting**: Verified with `dotnet format` (Allman braces, consistent style)
              - ✔️ **Build**: Clean compilation with no warnings in Release mode
              
              ### 🧪 Testing
              - ✔️ **Unit Tests**: Domain and SharedKernel tests passed
              - ✔️ **Integration Tests**: Infrastructure tests with SQL Server (Testcontainers) passed
              - ✔️ **Test Coverage**: Code coverage reports generated
              
              ### 🏗️ CI/CD Pipeline
              - ✔️ **CI - Formatting** pipeline: ✅ Passed
              - ✔️ **CI - Tests** pipeline: ✅ Passed
              - ✔️ **Release** pipeline: ✅ All stages completed
              
              ---
              
              ## 📦 Project Architecture
              
              **Clean Architecture / Domain-Driven Design Implementation**
              
              ### Layers
              
              1. **Domain Layer** (`OrderManagement.Domain`)
                 - Customer aggregate with value objects (Address, Email, Phone)
                 - Article catalog with hierarchical groups
                 - Order management (planned)
                 - Rich domain models with business logic
              
              2. **Application Layer** (`OrderManagement.Application`)
                 - Repository interfaces (Command/Query separation - CQRS pattern)
                 - Use case definitions
                 - DTOs for data transfer
              
              3. **Infrastructure Layer** (`OrderManagement.Infrastructure`)
                 - Entity Framework Core 9 data persistence
                 - SQL Server database with migrations
                 - Repository implementations:
                   - `CustomerCommandRepository` / `CustomerQueryRepository`
                   - `ArticleCommandRepository` / `ArticleQueryRepository`
                   - `ArticleGroupCommandRepository` / `ArticleGroupQueryRepository`
                 - Entity configurations with FluentAPI
              
              4. **API Layer** (planned)
                 - RESTful endpoints
                 - ASP.NET Core Web API
              
              ### Key Features Implemented
              
              - ✅ Customer management (CRUD operations)
              - ✅ Article catalog with hierarchical groups
              - ✅ Recursive hierarchy queries (CTE for parent-child relationships)
              - ✅ Repository pattern with Command/Query separation
              - ✅ Value objects (StronglyTypedIds, Email, Phone, Address)
              - ✅ Result pattern for error handling
              - ✅ Domain events infrastructure
              
              ---
              
              ## 🛠️ Technology Stack
              
              | Component | Technology | Version |
              |-----------|-----------|---------|
              | Language | C# | 13.0 |
              | Framework | .NET | 9.0 |
              | ORM | Entity Framework Core | 9.0 |
              | Database | SQL Server | 2022 |
              | Testing Framework | MSTest | Latest |
              | Integration Testing | Testcontainers | Latest |
              | CI/CD | Azure Pipelines | - |
              | VCS | Git / GitHub | - |
              
              ---
              
              ## 📊 Changes in This Release
              
              $(cat $(Agent.TempDirectory)/changelog.txt)
              
              ---
              
              ## 🔧 Build Information
              
              | Property | Value |
              |----------|-------|
              | **Build Number** | $(Build.BuildNumber) |
              | **Build ID** | $(Build.BuildId) |
              | **Commit SHA** | $(Build.SourceVersion) |
              | **Tag** | $(Build.SourceBranchName) |
              | **Triggered By** | $(Build.RequestedFor) |
              | **Build Date** | $(Build.QueueTime) |
              
              ---
              
              ## 🧪 Test Results
              
              All test suites passed successfully:
              
              - Domain Tests (Customer, Article, ArticleGroup entities)
              - SharedKernel Tests (Result pattern, ValueObjects)
              - Infrastructure Tests (Repository implementations, Database operations)
              
              ---
              
              ## 📝 Setup Instructions
              
              ### Prerequisites
              - .NET 9 SDK
              - SQL Server 2022 (or Docker)
              - Visual Studio 2022 or JetBrains Rider
              
              ### Run Tests
              ```bash
              # Unit tests (no database required)
              dotnet test tests/OrderManagement.Domain.Tests
              dotnet test tests/SharedKernel.Tests
              
              # Integration tests (uses Testcontainers - requires Docker)
              dotnet test tests/OrderManagement.Infrastructure.Tests
              ```
              
              ### Database Setup
              ```bash
              # Apply migrations
              dotnet ef database update --project src/OrderManagement.Infrastructure
              ```
              
              ---
              
              ## 👥 Team
              
              Group 05 - ZBW Advanced Software Development
              
              ---
              
              *This release was automatically created by Azure Pipelines Release Pipeline*
              RELEASE_NOTES
            displayName: 'Create Release Notes'

          # Create the GitHub Release
          - task: GitHubRelease@1
            displayName: 'Create GitHub Release'
            inputs:
              gitHubConnection: 'zbw-github-connection'
              repositoryName: 'zbw-online/it27.sw.group05'
              action: 'create'
              target: '$(Build.SourceVersion)'
              tagSource: 'gitTag'
              tag: '$(Build.SourceBranchName)'
              title: '🎓 Abgabe Aufgabe $(assignmentNumber) - Order Management System'
              releaseNotesFilePath: '$(Agent.TempDirectory)/release-notes.md'
              isDraft: false
              isPreRelease: false
              addChangeLog: true
              changeLogCompareToRelease: 'lastFullRelease'
              changeLogType: 'commitBased'
              changeLogLabels: |
                [
                  { "label" : "feature", "displayName" : "Features", "state" : "closed" },
                  { "label" : "bug", "displayName" : "Bug Fixes", "state" : "closed" },
                  { "label" : "enhancement", "displayName" : "Enhancements", "state" : "closed" },
                  { "label" : "documentation", "displayName" : "Documentation", "state" : "closed" }
                ]

          # Success notification
          - script: |
              echo "================================================"
              echo "✅ RELEASE SUCCESSFUL"
              echo "================================================"
              echo "Tag: $(Build.SourceBranchName)"
              echo "Release: Abgabe Aufgabe $(assignmentNumber)"
              echo "GitHub: https://github.com/zbw-online/it27.sw.group05/releases/tag/$(Build.SourceBranchName)"
              echo "================================================"
            displayName: 'Release Summary'