trigger:
  branches:
    include:
      - Develop   # TODO: switch to main when finished testing
  tags:
    include:
      - Abgabe_*

pr: none

pool:
  vmImage: ubuntu-latest

variables:
- group: github-secret-Public-Repository  # contains secret variable: GITHUB_TOKEN

- name: buildConfiguration
  value: Release

- name: artifactBaseName
  value: OrderManagement

# IMPORTANT: set your GitHub repo explicitly (owner/repo)
- name: githubRepo
  value: zbw-online/it27.sw.group05

steps:
- checkout: self
  clean: true

- task: UseDotNet@2
  inputs:
    packageType: sdk
    version: 9.x

- script: dotnet restore
  displayName: Restore

- script: dotnet format --verify-no-changes
  displayName: Verify formatting

- script: dotnet test --configuration $(buildConfiguration) --no-restore
  displayName: Run tests

- task: ArchiveFiles@2
  displayName: Create release ZIP
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactBaseName)_$(Build.SourceBranchName)_$(Build.BuildNumber).zip'
    replaceExistingArchive: true

- task: PublishBuildArtifacts@1
  displayName: Publish Azure artifact
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(artifactBaseName)_$(Build.SourceBranchName)_$(Build.BuildNumber).zip'
    ArtifactName: ReleasePackage

- script: |
    set -euo pipefail

    ZIP_PATH="$(Build.ArtifactStagingDirectory)/$(artifactBaseName)_$(Build.SourceBranchName)_$(Build.BuildNumber).zip"
    TAG_NAME="$(Build.SourceBranchName)"
    GH_REPO="$(githubRepo)"

    echo "Repo: $GH_REPO"
    echo "Tag:  $TAG_NAME"
    echo "Zip:  $ZIP_PATH"

    # gh is typically already installed on ubuntu-latest, but keep this safe check
    if ! command -v gh >/dev/null 2>&1; then
      sudo apt-get update
      sudo apt-get install -y gh
    fi

    # Authenticate using env var (NOT $(...))
    printf '%s' "$GITHUB_TOKEN" | gh auth login --with-token

    # Validate access (will fail fast with clear 403/404 if permissions are wrong)
    gh api "repos/$GH_REPO" >/dev/null

    # Create release if missing
    if ! gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
      gh release create "$TAG_NAME" \
        --repo "$GH_REPO" \
        --title "$TAG_NAME" \
        --notes "Automated release created by Azure DevOps pipeline."
    fi

    # Upload (replace if exists)
    gh release upload "$TAG_NAME" "$ZIP_PATH" --repo "$GH_REPO" --clobber
  displayName: Create GitHub Release + upload ZIP
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)
