trigger:
  branches:
    include:
      - Develop
  tags:
    include:
      - Abgabe_*

pr: none

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  clean: true

- task: UseDotNet@2
  inputs:
    packageType: sdk
    version: 9.x

- script: dotnet restore
  displayName: Restore

- script: dotnet format --verify-no-changes
  displayName: Verify formatting

- script: dotnet test --configuration Release --no-restore
  displayName: Run tests

# Create release folder
- script: |
    mkdir release
    cp -r * release/
  displayName: Prepare release content

# Optional: convert docx to pdf if needed (Linux needs libreoffice)
- script: libreoffice --headless --convert-to pdf *.docx

# Zip it
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: 'release'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/OrderManagement_$(Build.SourceBranchName).zip'
    replaceExistingArchive: true

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'ReleasePackage'
